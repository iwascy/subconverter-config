      - Self-Hosted-HK
      - SELECT
      - DIRECT

  - name: Perplexity
    type: select
    proxies:
      - Self-Hosted-US
      - Self-Hosted-SG
      - Self-Hosted-HK
      - SELECT
      - DIRECT

  - name: Social Media
    type: select
    proxies:
      - Self-Hosted-US
      - Self-Hosted-SG
      - Self-Hosted-HK
      - SELECT

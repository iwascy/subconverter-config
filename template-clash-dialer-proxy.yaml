# Local Clash config generated from macau.ini group/rule layout.
# Fill the subscription placeholders before using.

mixed-port: 7890
allow-lan: true
mode: rule
log-level: info
external-controller: 127.0.0.1:9090

proxy-providers:
  SELF_PROVIDER:
    type: http
    url: "<SELF_SUB_URL>?target=ClashMeta"
    interval: 36000
    path: "./proxy_provider/self.yaml"
    filter: "(?i)(bwg|bagevm|self-hosted|oracle)"
    health-check:
      enable: true
      url: "https://www.gstatic.com/generate_204"
      interval: 600

  ALL_PROVIDER:
    type: http
    url: "<ALL_SUB_URL>?target=ClashMeta"
    interval: 36000
    path: "./proxy_provider/all.yaml"
    health-check:
      enable: true
      url: "https://www.gstatic.com/generate_204"
      interval: 600

proxy-groups:
  - name: SELECT
    type: select
    proxies:
      - Self-Hosted-US
      - Self-Hosted-SG
      - Self-Hosted-HK
      - DIRECT
    use:
      - ALL_PROVIDER

  - name: Self-Hosted-US
    type: select
    use:
      - SELF_PROVIDER
    filter: "(?i)((bwg|bagevm|self-hosted|oracle).*(US|美国|洛杉矶)|(US|美国|洛杉矶).*(bwg|bagevm|self-hosted|oracle))"

  - name: Self-Hosted-SG
    type: select
    use:
      - SELF_PROVIDER
    filter: "(?i)((bwg|bagevm|self-hosted|oracle).*(SG|新加坡)|(SG|新加坡).*(bwg|bagevm|self-hosted|oracle))"

  - name: Self-Hosted-HK
    type: select
    use:
      - SELF_PROVIDER
    filter: "(?i)((bwg|bagevm|self-hosted|oracle).*(HK|香港)|(HK|香港).*(bwg|bagevm|self-hosted|oracle))"

  - name: YouTube
    type: select
    proxies:
      - Self-Hosted-US
      - Self-Hosted-SG
      - Self-Hosted-HK
      - SELECT
      - DIRECT

  - name: Telegram
    type: select
    proxies:
      - Self-Hosted-US
      - Self-Hosted-SG
      - Self-Hosted-HK
      - SELECT
      - DIRECT

  - name: TelegramSG
    type: select
    proxies:
      - Self-Hosted-SG
      - Self-Hosted-US
      - Self-Hosted-HK
      - SELECT
      - DIRECT

  - name: TelegramUS
    type: select
    proxies:
      - Self-Hosted-US
      - Self-Hosted-SG
      - Self-Hosted-HK
      - SELECT
      - DIRECT

  - name: Streaming media
    type: select
    proxies:
      - Self-Hosted-US
      - Self-Hosted-SG
      - Self-Hosted-HK
      - SELECT
      - DIRECT

  - name: AI
    type: select
    proxies:
      - Self-Hosted-US
      - Self-Hosted-SG
      - Self-Hosted-HK
      - SELECT
      - DIRECT

  - name: Claude
    type: select
    proxies:
      - Self-Hosted-US
      - Self-Hosted-SG
      - Self-Hosted-HK
      - SELECT
      - DIRECT

  - name: Gemini
